name: Update neofetch README banner

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write          # lets the built-in token push the updated image

jobs:
  update-banner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate banner SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed
          GH_USERNAME: altf4-games
        run: python scripts/generate_banner.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/dark_mode.svg assets/light_mode.svg
          git diff --staged --quiet || git commit -m "chore: update neofetch banner"
          git push
